<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>学习记录分析工具</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<h1>📊 学习记录分析工具</h1>

<input type="file" id="imageInput" />
<button onclick="uploadImage()">上传并识别</button>

<h2>📋 记录表</h2>
<table border="1" id="table">
  <thead>
    <tr>
      <th>科目</th>
      <th>学期/周次</th>
      <th>课程</th>
      <th>Lesson</th>
      <th>内容</th>
      <th>成绩</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<br>
<button onclick="generateReport()">生成评估报告</button>

<h2>📈 报告</h2>
<div id="report"></div>

<script src="app.js"></script>
</body>
</html>
