<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>学习记录分析工具</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 15px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #f2f2f2;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      cursor: pointer;
    }

    #report {
      margin-top: 20px;
      padding: 15px;
      background: #f5f5f5;
    }
  </style>
</head>

<body>

  <h1>📊 学习记录分析工具</h1>

  <!-- 上传 -->
  <input type="file" id="fileInput" />

  <!-- 表格 -->
  <h2>📋 记录表</h2>

  <table>
    <thead>
      <tr>
        <th>科目</th>
        <th>学期/周次</th>
        <th>课程</th>
        <th>Lesson</th>
        <th>内容</th>
        <th>成绩</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <!-- 按钮 -->
  <button id="genReport">生成评估报告</button>

  <!-- 报告 -->
  <h2>📈 报告</h2>
  <div id="report"></div>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
