<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>学习记录分析工具</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
</head>

<body>
  <h1>📊 学习记录分析工具</h1>

  <input type="file" id="upload" />

  <p id="status"></p>

  <h2>📋 记录表</h2>
  <table>
    <thead>
      <tr>
        <th>科目</th>
        <th>学期/周次</th>
        <th>课程</th>
        <th>Lesson</th>
        <th>内容</th>
        <th>成绩</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>

  <button onclick="generateReport()">生成评估报告</button>

  <h2>📈 报告</h2>
  <pre id="report"></pre>

  <script src="app.js"></script>
</body>
</html>
