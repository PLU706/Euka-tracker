<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>学习记录分析工具</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 1200px; margin: 0 auto; }
    table { border-collapse: collapse; width: 100%; }
    td, th { border: 1px solid #ccc; padding: 8px; font-size: 14px; }
    #loading { display:none; color:blue; }
    #chartWrapper { width: 600px; max-width: 100%; }

    .tab-bar { display:flex; gap:8px; margin: 20px 0 12px; }
    .tab-btn { padding: 8px 20px; border: 1px solid #ccc; border-radius: 6px; cursor:pointer; background:#f5f5f5; font-size:14px; }
    .tab-btn.active { background:#1a73e8; color:white; border-color:#1a73e8; }

    .filter-bar { display:flex; gap:12px; margin-bottom:12px; align-items:center; flex-wrap:wrap; }
    .filter-bar select { padding:6px 10px; border:1px solid #ccc; border-radius:6px; font-size:14px; }
    .filter-bar label { font-size:14px; color:#555; }

    .report-section { margin-bottom:24px; padding:16px; border:1px solid #ddd; border-radius:8px; }
    .report-section h3 { margin-top:0; }
    .overall-box { padding:16px; background:#f9f9f9; border-radius:8px; margin-top:16px; }
  </style>
</head>
<body>

<h1>📊 学习记录分析工具</h1>

<input type="file" id="imageInput" accept="image/*" />
<p id="loading">⏳ 正在识别中，请稍等...</p>

<!-- 标签栏 -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('records')">📋 记录表</button>
  <button class="tab-btn" onclick="showTab('chart')">📈 成绩趋势</button>
  <button class="tab-btn" onclick="showTab('report')">📊 学习报告</button>
</div>

<!-- 记录表 -->
<div id="tab-records">
  <div class="filter-bar">
    <label>筛选：</label>
    <select id="filterSubject" onchange="renderTable()"><option value="">全部科目</option></select>
    <select id="filterTerm" onchange="renderTable()"><option value="">全部Term</option></select>
    <select id="filterWeek" onchange="renderTable()"><option value="">全部Week</option></select>
  </div>
  <table>
    <thead>
      <tr>
        <th>科目</th><th>学期/周次</th><th>课程</th><th>Lesson</th><th>内容</th><th>成绩</th><th>操作</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- 图表 -->
<div id="tab-chart" style="display:none">
  <div class="filter-bar">
    <label>按：</label>
    <select id="chartGroupBy" onchange="drawChart()">
      <option value="lesson">每节课</option>
      <option value="week">每周平均</option>
      <option value="term">每Term平均</option>
    </select>
    <select id="chartSubject" onchange="drawChart()"><option value="">全部科目</option></select>
  </div>
  <div id="chartWrapper"><canvas id="chart"></canvas></div>
</div>

<!-- 报告 -->
<div id="tab-report" style="display:none">
  <div class="filter-bar">
    <label>报告层级：</label>
    <select id="reportLevel">
      <option value="week">Week 报告</option>
      <option value="term">Term 报告</option>
      <option value="year">Year 报告</option>
    </select>
    <select id="reportTerm" style="display:none"><option value="">选择Term</option></select>
    <select id="reportWeek" style="display:none"><option value="">选择Week</option></select>
    <button onclick="generateReport()" style="padding:6px 16px;background:#1a73e8;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px">生成报告</button>
  </div>
  <div id="report"></div>
</div>

<script src="app.js"></script>
</body>
</html>
